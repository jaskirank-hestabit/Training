embedding:
  model_name: all-MiniLM-L6-v2
  device: cpu

llm:
  provider: groq
  model_name: llama-3.1-8b-instant     # replaces decommissioned llama3-8b-8192
  max_new_tokens: 300

chunking:
  chunk_size: 500
  overlap: 100

limits:
  max_file_size_chars: 400000
  max_chunks_per_file: 200
  max_total_chunks: 1000

retrieval:
  top_k: 5
  min_rerank_score: 0.35

sql:
  db_path: src/data/raw/sample.db