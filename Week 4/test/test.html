<!-- For testing the cors check -->

<!DOCTYPE html>
<html>
<body>
  <button onclick="callAPI()">Call API</button>

  <script>
    function callAPI() {
      fetch("http://localhost:5000/api/products")
        .then(res => res.json())
        .then(data => console.log(data))
        .catch(err => console.error("Blocked:", err));
    }
  </script>
</body>
</html>
