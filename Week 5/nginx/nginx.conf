events {}

http {

    upstream backend_servers {
        server server1:5000;
        server server2:5000;
    }

    server {
        listen 80;

        location /api {
            proxy_pass http://backend_servers;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}