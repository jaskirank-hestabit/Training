services:

  mongo:
    image: mongo:6
    restart: always
    volumes:
      - mongo-data:/data/db
    profiles:
      - prod

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  server1:
    build: ../day1
    restart: always
    env_file:
      - .env
    depends_on:
      - mongo
    profiles:
      - prod

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  server2:
    build: ../day1
    restart: always
    env_file:
      - .env
    depends_on:
      - mongo
    profiles:
      - prod

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  client:
    build:
      context: ./client       
      args:
        ENV_FILE: .env.prod
    restart: always
    environment:
      - PORT=3000
      - NODE_ENV=production
    profiles:
      - prod

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "8080:80"
      - "8443:443"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ../day4/certs:/etc/nginx/certs

    depends_on:
      - server1
      - server2
      - client

    profiles:
      - prod

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mongo-data: