services:
  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    container_name: node-server
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app

  client:
    build: ./client
    container_name: react-client
    ports:
      - "3000:3000"
    depends_on:
      - server
    volumes:
      - ./client:/app

volumes:
  mongo-data:
